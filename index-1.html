                    <!-- Trigger the Modal -->
                    <div class="modal-info">
                        <img class="myImg" src="assets/img/places/index-1/center-p-min.jpg" data-caption="Архитектурный облик главной площади города сформировался во второй половине XX века. Ансамбль площади является частью единого оформления центра города, в который входит пешеходный мост, площадь с монументом «Навеки с Россией», эспланада, набережная зодчего Дудина. Наиболее интересные объекты Центральной площади – Республиканский Дом правительства, ЦУМ, театр оперы и балета и светомузыкальный фонтан.">

                    </div>
                    <!-- The Modal -->
                    <div class="modal">
                        <span class="close">&times;</span>
                        <img class="modal-content">
                        <div class="caption"></div>
                    </div>
                </div>

                <div class="modal__item">
                    <!-- Trigger the Modal -->
                    <div class="modal-info">
                        <img class="myImg" src="assets/img/places/index-1/naber-min.jpg" data-caption="Зона пешеходного благоустроенного променада проложена по левому берегу Ижевского пруда. Это популярное место для прогулок протяженностью 2,4 км. На набережной часто проводят необычные творческие мероприятия и выставки. Работает прокат спортивного инвентаря и лодок, кафе и рестораны. Много достопримечательностей – ротонда, монумент «Дружба народов», Солнечные часы. На правом берегу пруда находится южная набережная им. Белобородова.">
                        <div class="modal__text">Набережная зодчего Дудина</div>
                    </div>
                    <!-- The Modal -->
                    <div class="modal">
                        <span class="close">&times;</span>
                        <img class="modal-content">
                        <div class="caption"></div>
                    </div>
                </div>

                <div class="modal__item">
                    <!-- Trigger the Modal -->
                    <div class="modal-info">
                        <img class="myImg" src="assets/img/places/index-1/mon-min.jpg" data-caption="Находится в сквере Победы. В состав памятного комплекса входит статуя воина, чаша Вечного огня, стелы с именами погибших в Великой Отечественной Войне солдат. Памятник воину с развевающимся флагом в руке составляет в высоту 10 метров. Макет скульптуры неизвестного солдата выполнен Волковым Б.К. Пламя Вечного огня зажжено факелом, привезенным с Вечного огня от могилы Неизвестного солдата в Москве.">

                        <span class="close">&times;</span>
                        <img class="modal-content">
                        <div class="caption"></div>
                    </div>
                </div>

                <div class="modal__item">
                    <!-- Trigger the Modal -->

                        <img class="myImg" src="assets/img/places/index-1/zoo-min.jpeg" data-caption="Расположен на территории парка Кирова. Занимает площадь в 16 га. В зоопарке обитают представители разных уголков земного шара – жирафы, гориллы, тигры, носороги, волки, белые медведи, дикобразы, обезьяны. В отдельном павильоне живут экзотические для нашей страны животные – крокодил, хамелеоны, змеи, тритоны. Для зверей построены комфортные просторные павильоны, от посетителей их отделяет ударопрочное стекло.">

                    </div>
                    <!-- The Modal -->

                        <span class="close">&times;</span>
                        <img class="modal-content">
                        <div class="caption"></div>
                    </div>
                </div>

                <div class="modal__item">
                    <!-- Trigger the Modal -->
                    <div class="modal-info">
                        <img class="myImg" src="assets/img/places/index-1/gos-c-min.jpg" data-caption="Современное здание цирка построено на Красноармейской улице в 2000-2003 годы. Проект циркового комплекса выполнил архитектор из Москвы М. Веснин. Он рассчитан на 1700 зрителей, в нем установлено звуковое и световое оборудование, позволяющее проводить яркие шоу высокого уровня. На сцене цирка показывают представления для детей и взрослых, проводят ежегодные цирковые фестивали, принимают гастролирующие коллективы.">

                    </div>

                        <span class="close">&times;</span>
                        <img class="modal-content">
                        <div class="caption"></div>
                    </div>
                </div>

                <div class="modal__item">
                    <!-- Trigger the Modal -->

                        <img class="myImg" src="assets/img/places/index-1/kalash-min.jpg" data-caption="Экспозиции музейно-выставочного комплекса посвящены стреловому оружию. Назван он в честь создателя легендарного автомата Калашникова. В музее можно узнать историю стрелкового производства в Ижевске, о вкладе ижевских оружейников в историю вооружения страны. Много внимания уделено личности Калашникова. При музее работает демонстрационный интерактивный зал, в котором есть огнестрельный и арбалетный тиры.">

                        <div class="caption"></div>
                    </div>
                </div>

                <div class="modal__item">
                    <!-- Trigger the Modal -->
                    <div class="modal-info">
                        <img class="myImg" src="assets/img/places/index-1/sad-min.jpg" data-caption="Самый старый парк Ижевска находится в историческом центре на берегу Ижевского пруда. Основан сад в 1857 году. С советского времени сохранились скульптуры и ротонда. Ныне парк выглядит современно, в нем расположено большое количество аттракционов и развлекательных комплексов. Большая их часть – спокойные карусели для детей младшего возраста. Есть батуты, горки, лабиринт, карусель с лошадками, автодром, детская железная дорога.">

                        <div class="caption"></div>
                    </div>
                </div>

                        <img class="myImg" src="assets/img/places/index-1/muzey-min.jpg" data-caption="Национальный музей, образованный в 1920 году. В его фондах хранится около 200 000 предметов разной тематики – этнография, история, археология, фотографии, редкие книги, огнестрельное и холодное оружие. Посетители музея узнают об истории края, его коренных народах – их жизни, быте и традициях, природе Удмуртии, развитии промышленности. Музей занимает стены Арсенала Ижевского оружейного завода XIX века.">
